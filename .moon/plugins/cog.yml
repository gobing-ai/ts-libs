# A YAML plugin for proto:
# https://moonrepo.dev/docs/proto/non-wasm-plugin
#
# Cocogitto's release assets and the binary path inside each tarball are
# arch-specific (e.g. aarch64-apple-darwin/cog). proto's {arch} resolves to
# the Rust triple component (aarch64 / x86_64), matching the asset names
# directly, so no [install.arch] remap is needed.
#
# Linux caveat: cocogitto publishes only aarch64-gnu and x86_64-musl, with no
# matrix for the other libc/arch combos. proto derives {libc} from the host,
# not the arch, so it cannot pick the right asset for both. macOS (the primary
# target here) and Windows map 1:1 and install cleanly. If you need Linux,
# pin the libc that matches your arch in the download-file/exe-path below.

name: cog
type: cli

resolve:
  git-url: https://github.com/cocogitto/cocogitto

platform:
  linux:
    download-file: cocogitto-{version}-{arch}-unknown-linux-musl.tar.gz
    exe-path: "{arch}-unknown-linux-musl/cog"
  macos:
    download-file: cocogitto-{version}-{arch}-apple-darwin.tar.gz
    exe-path: "{arch}-apple-darwin/cog"
  windows:
    download-file: cocogitto-{version}-{arch}-pc-windows-msvc.tar.gz
    exe-path: "{arch}-pc-windows-msvc/cog.exe"

install:
  download-url: https://github.com/cocogitto/cocogitto/releases/download/{version}/{download_file}

# Meta-validation for local Spur rule/preset YAML.
rules:
  - id: rule-yaml-files-valid-structure
    description: "Local .spur/rules YAML files must parse and expose either rule entries or a preset definition."
    severity: error
    evaluator:
      type: exit-code
      config:
        command: sh
        args:
          - -c
          - |
            errors=0
            for f in $(rg --files .spur/rules -g '*.yaml'); do
              if ! yq -e '.' "$f" >/dev/null 2>&1; then
                echo "INVALID: $f is not valid YAML"
                errors=$((errors + 1))
                continue
              fi

              if yq -e '.rules != null' "$f" >/dev/null 2>&1; then
                if ! yq -e '.rules | type == "!!seq"' "$f" >/dev/null 2>&1; then
                  echo "INVALID: $f: .rules must be an array"
                  errors=$((errors + 1))
                  continue
                fi

                count="$(yq '.rules | length' "$f")"
                i=0
                while [ "$i" -lt "$count" ]; do
                  rid="$(yq ".rules[$i].id // \"\"" "$f")"
                  rdesc="$(yq ".rules[$i].description // \"\"" "$f")"
                  rtype="$(yq ".rules[$i].evaluator.type // \"\"" "$f")"
                  if [ -z "$rid" ] || [ "$rid" = "null" ]; then
                    echo "INVALID: $f: rules[$i] missing id"
                    errors=$((errors + 1))
                  fi
                  if [ -z "$rdesc" ] || [ "$rdesc" = "null" ]; then
                    echo "INVALID: $f: rules[$i] missing description"
                    errors=$((errors + 1))
                  fi
                  if [ -z "$rtype" ] || [ "$rtype" = "null" ]; then
                    echo "INVALID: $f: rules[$i] missing evaluator.type"
                    errors=$((errors + 1))
                  fi
                  i=$((i + 1))
                done
              elif yq -e '.name != null' "$f" >/dev/null 2>&1; then
                if ! yq -e '.extends | type == "!!seq"' "$f" >/dev/null 2>&1; then
                  echo "INVALID: $f: presets must define an extends array"
                  errors=$((errors + 1))
                fi
              else
                echo "INVALID: $f: expected .rules or .name"
                errors=$((errors + 1))
              fi
            done
            [ "$errors" -eq 0 ] || exit 1
    include:
      - ".spur/rules/**/*.yaml"

# Example rule: enforce kernel-no-yaml boundary
# See D-008: kernel never reads YAML directly.
rules:
  - id: kernel-no-yaml
    name: Kernel YAML Boundary
    description: Ensure kernel never imports YAML directly
    evaluator:
      type: import-boundary
      options:
        forbidden:
          - yaml
          - js-yaml
        target: packages/kernel/src
    severity: error
    enabled: true

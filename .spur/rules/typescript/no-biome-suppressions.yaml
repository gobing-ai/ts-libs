# No Biome suppression comments — project-level override.
# Exclude test files where noExplicitAny and useLiteralKeys suppressions are legitimate.
include:
  - "packages/**/src/**/*.ts"
  - "packages/**/src/**/*.tsx"
exclude:
  - "**/node_modules/**"
rules:
  - id: no-biome-suppressions
    description: >
      Do not use biome-ignore or biome-ignore-all comments to suppress lint
      rules.  Fix the underlying issue instead.
    severity: error
    evaluator:
      type: regex
      config:
        pattern: "biome-ignore"

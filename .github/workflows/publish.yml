name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      # GitHub tag filters use a simplified glob (NOT regex): '*' matches any
      # run of characters except '/', and '**' matches across '/' too. Char
      # ranges like [0-9] and the '+' quantifier are not supported. The scoped
      # tag '@gobing-ai/ts-utils-v0.1.3' contains a '/', so '**' is required.
      - '**-v*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

# Each per-package tag push triggers its own run. Serialize them (never cancel)
# so they publish one at a time instead of racing — the first publishes every
# package, the rest skip cleanly.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Trusted Publishing requires npm >= 11.5.1 and Node >= 22.14.0.
      # setup-bun provides Bun for build/test; npm publish runs on the system Node.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Upgrade npm for OIDC support
        # Pin a known-good floor: OIDC trusted publishing needs >= 11.5.1.
        # Using @latest risks a broken npm release silently breaking releases.
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish packages
        run: |
          set -euo pipefail
          # Publish leaves-first so a dependent never resolves before its dependency.
          # Each pushed tag triggers a separate run, so a version may already be
          # published by a concurrent/earlier run. The npm view check is a fast
          # path; the publish itself also tolerates an "already published"
          # conflict so a re-trigger is a clean skip, not a job failure.
          for pkg in utils runtime db infra; do
            dir="packages/$pkg"
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "skip: $name@$version already published"
              continue
            fi
            echo "publish: $name@$version"
            if ! out=$(cd "$dir" && npm publish --access public 2>&1); then
              if echo "$out" | grep -qiE "cannot publish over|previously published|already exists|E409|EPUBLISHCONFLICT"; then
                echo "skip: $name@$version already published (lost publish race)"
              else
                echo "$out" >&2
                exit 1
              fi
            else
              echo "$out"
            fi
          done
